<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#016C66" />
  <title>إدارة أكواد الخصم | وازن</title>
  <meta name="description" content="لوحة إدارة أكواد خصم وازن." />
  <link rel="icon" type="image/png" href="/wazen_logo.png?v=20260503" />
  <link rel="apple-touch-icon" href="/wazen_logo.png?v=20260503" />
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--brand:#016C66;--accent:#19DDD0;--bg:#041210;--text:#F7FFFE;--muted:rgba(247,255,254,.70);--muted2:rgba(247,255,254,.50);--line:rgba(255,255,255,.13);--success:#91F6CB;--danger:#FFB4B4;--warning:#FFD990;--shadow:0 30px 90px rgba(0,0,0,.40);--radius:28px}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Tajawal",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(850px 620px at 8% -6%,rgba(25,221,208,.22),transparent 56%),radial-gradient(760px 640px at 100% 12%,rgba(0,157,146,.22),transparent 58%),linear-gradient(180deg,#041210 0%,#06201c 55%,#03100e 100%)}a{color:inherit;text-decoration:none}button,input,select{font-family:inherit}.page{width:min(1160px,100%);margin:auto;padding:24px 16px 36px}.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px}.logo{width:54px;height:54px;border-radius:19px;overflow:hidden;border:1px solid var(--line);background:rgba(255,255,255,.08)}.logo img{width:100%;height:100%;object-fit:cover}.brand h2{margin:0;font-size:21px;font-weight:900}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}.topActions{display:flex;gap:9px;flex-wrap:wrap}.pill,.link{border:1px solid var(--line);background:rgba(255,255,255,.07);border-radius:999px;padding:10px 13px;font-size:13px;font-weight:900}.panel{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.055));box-shadow:var(--shadow);backdrop-filter:blur(18px)}.panel:before{content:"";position:absolute;inset:0 0 auto 0;height:5px;background:linear-gradient(90deg,var(--brand),var(--accent),var(--brand))}.login{width:min(520px,100%);margin:70px auto 0;padding:24px}.admin{display:grid;grid-template-columns:390px minmax(0,1fr);gap:18px;align-items:start}.card{padding:20px}.title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.title h1,.title h3{margin:0;font-size:22px;font-weight:900}.title span{color:var(--muted2);font-size:12px;line-height:1.6;font-weight:800}.muted{color:var(--muted);line-height:1.8;font-size:13px}.form{display:grid;gap:11px}label{color:var(--muted);font-size:13px;font-weight:900}input,select{width:100%;min-height:48px;border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px 13px;background:rgba(0,0,0,.18);color:var(--text);outline:none;font-size:14px}input::placeholder{color:rgba(247,255,254,.36)}input:focus,select:focus{border-color:rgba(25,221,208,.70);box-shadow:0 0 0 4px rgba(25,221,208,.10)}select option{background:#102320;color:#fff}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.checks{display:flex;gap:12px;flex-wrap:wrap}.checks label{display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.045);border-radius:999px;padding:10px 12px}.checks input{width:auto;min-height:auto}.btn{border:0;border-radius:17px;min-height:50px;padding:13px 14px;color:#05201d;cursor:pointer;background:linear-gradient(135deg,#A2FFD6,#19DDD0);font-size:14px;font-weight:900}.btn.secondary{color:var(--text);background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14)}.btn.ghost{color:var(--text);background:transparent;border:1px solid rgba(255,255,255,.15)}.btn.danger{color:#280707;background:var(--danger)}.btn:disabled{opacity:.56;cursor:not-allowed}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px}.message{display:none;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);border-radius:18px;padding:13px 14px;font-size:13px;line-height:1.8}.message.show{display:block}.message.ok{border-color:rgba(145,246,203,.28);background:rgba(145,246,203,.08);color:var(--success)}.message.err{border-color:rgba(255,180,180,.28);background:rgba(255,180,180,.08);color:var(--danger)}.message.warn{border-color:rgba(255,217,144,.28);background:rgba(255,217,144,.08);color:var(--warning)}.adminHeader{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.adminInfo{border:1px solid rgba(145,246,203,.20);background:rgba(145,246,203,.07);border-radius:18px;padding:11px 13px;font-size:12.5px;line-height:1.7}.tableWrap{overflow:auto;border:1px solid rgba(255,255,255,.10);border-radius:20px}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.09);vertical-align:top;font-size:13px;text-align:right}th{color:var(--muted);background:rgba(255,255,255,.045);font-weight:900}tr:last-child td{border-bottom:0}.status{display:inline-block;border-radius:999px;padding:6px 9px;font-weight:900;font-size:11px}.status.on{background:rgba(145,246,203,.12);color:var(--success);border:1px solid rgba(145,246,203,.22)}.status.off{background:rgba(255,180,180,.10);color:var(--danger);border:1px solid rgba(255,180,180,.22)}.smallActions{display:flex;gap:7px;flex-wrap:wrap}.smallActions .btn{min-height:38px;padding:8px 10px;font-size:12px}.empty{padding:24px;text-align:center;color:var(--muted)}.hidden{display:none!important}@media(max-width:940px){.admin{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}@media(max-width:560px){.page{padding:18px 12px}.login{margin-top:24px}.row,.buttons{grid-template-columns:1fr}.btn{width:100%}.adminHeader{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
  <main class="page">
    <header class="top"><a class="brand" href="/pay/"><div class="logo"><img src="/wazen_logo.png" alt="وازن"></div><div><h2>وازن</h2><p>إدارة أكواد الخصم</p></div></a><div class="topActions"><span class="pill">صلاحيات إدارية فقط</span><a class="link" href="/pay/">صفحة الدفع</a></div></header>
    <div id="message" class="message" aria-live="polite"></div>
    <section id="loginView" class="panel login"><div class="title"><h1>تسجيل دخول الإدارة</h1><span>مالك / أدمن / دعم</span></div><p class="muted">لا تظهر لوحة الأكواد إلا بعد التحقق من صلاحية الحساب من السيرفر.</p><div class="form"><label for="email">البريد الإلكتروني</label><input id="email" type="email" autocomplete="email" placeholder="admin@email.com"><label for="password">كلمة المرور</label><input id="password" type="password" autocomplete="current-password" placeholder="••••••••"><div class="buttons"><button class="btn" id="loginBtn" type="button">دخول</button><button class="btn secondary" id="googleBtn" type="button">Google</button></div></div></section>
    <section id="adminView" class="hidden">
      <div class="adminHeader"><div class="adminInfo" id="adminInfo"></div><div class="topActions"><button class="btn secondary" id="refreshBtn" type="button">تحديث</button><button class="btn ghost" id="logoutBtn" type="button">خروج</button></div></div>
      <div class="admin">
        <section class="panel card"><div class="title"><h3 id="formTitle">إنشاء كود خصم</h3><span>الخصم يطبق من السيرفر</span></div><form id="couponForm" class="form"><input type="hidden" id="editingCode"><label for="code">كود الخصم</label><input id="code" placeholder="LAUNCH50" autocomplete="off"><label for="label">اسم العرض</label><input id="label" placeholder="عرض الإطلاق"><div class="row"><div><label for="type">نوع الخصم</label><select id="type"><option value="percent">نسبة مئوية</option><option value="fixed">خصم مبلغ</option><option value="final">سعر نهائي</option></select></div><div><label for="value">القيمة</label><input id="value" type="number" min="1" step="0.01" placeholder="50"></div></div><label>يشمل</label><div class="checks"><label><input id="planMonthly" type="checkbox" checked> الشهري</label><label><input id="planYearly" type="checkbox" checked> السنوي</label></div><div class="row"><div><label for="maxUses">عدد الاستخدامات</label><input id="maxUses" type="number" min="0" placeholder="اتركه فارغ للمفتوح"></div><div><label for="active">الحالة</label><select id="active"><option value="true">مفعل</option><option value="false">متوقف</option></select></div></div><div class="row"><div><label for="startsAt">يبدأ في</label><input id="startsAt" type="datetime-local"></div><div><label for="expiresAt">ينتهي في</label><input id="expiresAt" type="datetime-local"></div></div><div class="buttons"><button class="btn" id="saveBtn" type="submit">حفظ الكود</button><button class="btn ghost" id="resetFormBtn" type="button">مسح</button></div></form></section>
        <section class="panel card"><div class="title"><h3>الأكواد الحالية</h3><span>تعديل / إيقاف / حذف</span></div><div class="tableWrap"><table><thead><tr><th>الكود</th><th>العرض</th><th>الخصم</th><th>الباقات</th><th>الاستخدام</th><th>المدة</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody id="couponRows"><tr><td colspan="8"><div class="empty">جاري التحميل...</div></td></tr></tbody></table></div></section>
      </div>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig={apiKey:'AIzaSyD9y9FED7L-s0unONweN-5LhmwEdipXYUo',authDomain:'wazenfapp.firebaseapp.com',projectId:'wazenfapp',storageBucket:'wazenfapp.appspot.com',messagingSenderId:'209409669834',appId:'1:209409669834:web:9e33eba07509ee28a29233'};const PROJECT_ID='wazenfapp';const REGION='europe-west1';const API_BASE=`https://${REGION}-${PROJECT_ID}.cloudfunctions.net`;const endpoints={assertAdmin:`${API_BASE}/assertCouponAdminAccess`,list:`${API_BASE}/adminListWebCoupons`,save:`${API_BASE}/adminSaveWebCoupon`,delete:`${API_BASE}/adminDeleteWebCoupon`};firebase.initializeApp(firebaseConfig);const auth=firebase.auth();let currentUser=null;let isVerifiedAdmin=false;let coupons=[];const $=(id)=>document.getElementById(id);const message=$('message');
    function showMessage(text,type=''){message.textContent=text||'';message.className=`message ${text?'show':''} ${type}`}function setLoading(btn,loading,text){if(!btn)return;btn.disabled=loading;btn.textContent=loading?'جاري التنفيذ...':text}async function authedFetch(url,options={}){if(!currentUser)throw new Error('not-signed-in');const token=await currentUser.getIdToken(true);const response=await fetch(url,{...options,headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`,...(options.headers||{})}});const data=await response.json().catch(()=>({}));if(!response.ok||data.ok===false)throw new Error(data.message||'request-failed');return data}
    function showLoginOnly(){$('loginView').classList.remove('hidden');$('adminView').classList.add('hidden');isVerifiedAdmin=false}function showAdmin(user,role){$('loginView').classList.add('hidden');$('adminView').classList.remove('hidden');isVerifiedAdmin=true;$('adminInfo').innerHTML=`<b>تم التحقق من الصلاحية</b><br>${user.email||user.uid}<br>الدور: ${role||'admin'}`}async function verifyAdminAccess(user){try{showMessage('جاري التحقق من الصلاحية...','warn');const data=await authedFetch(endpoints.assertAdmin,{method:'POST',body:'{}'});showAdmin(user,data.role||'admin');showMessage('','');await loadCoupons()}catch(e){showLoginOnly();showMessage('هذا الحساب لا يملك صلاحية إدارة أكواد الخصم.','err');await auth.signOut()}}
    auth.getRedirectResult().catch(()=>showMessage('تعذر إكمال تسجيل الدخول.','err'));auth.onAuthStateChanged(async user=>{currentUser=user;if(!user){showLoginOnly();return}await verifyAdminAccess(user)});$('loginBtn').addEventListener('click',async()=>{const btn=$('loginBtn');try{setLoading(btn,true,'دخول');const email=$('email').value.trim();const password=$('password').value;if(!email||!password)throw new Error('missing');await auth.signInWithEmailAndPassword(email,password)}catch(e){showMessage('تعذر تسجيل الدخول. تأكد من البريد وكلمة المرور.','err')}finally{setLoading(btn,false,'دخول')}});$('googleBtn').addEventListener('click',async()=>{const btn=$('googleBtn');try{setLoading(btn,true,'Google');const provider=new firebase.auth.GoogleAuthProvider();provider.setCustomParameters({prompt:'select_account'});await auth.signInWithPopup(provider)}catch(e){const provider=new firebase.auth.GoogleAuthProvider();provider.setCustomParameters({prompt:'select_account'});try{await auth.signInWithRedirect(provider)}catch(_){showMessage('تعذر تسجيل الدخول عبر Google.','err')}}finally{setLoading(btn,false,'Google')}});$('logoutBtn').addEventListener('click',()=>auth.signOut());$('refreshBtn').addEventListener('click',loadCoupons);
    function toIsoOrNull(value){if(!value)return null;const d=new Date(value);return isNaN(d.getTime())?null:d.toISOString()}function fromIsoForInput(value){if(!value)return'';const d=new Date(value);if(isNaN(d.getTime()))return'';const pad=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`}function formatDate(value){if(!value)return'بدون';const d=new Date(value);return isNaN(d.getTime())?'بدون':d.toLocaleString('ar-SA')}function formatDiscount(c){if(c.type==='percent')return`${c.value}%`;if(c.type==='fixed')return`خصم ${c.value} ر.س`;if(c.type==='final')return`السعر ${c.value} ر.س`;return'-'}function plansText(plans){const p=Array.isArray(plans)?plans:[];if(p.includes('monthly')&&p.includes('yearly'))return'الشهري والسنوي';if(p.includes('monthly'))return'الشهري';if(p.includes('yearly'))return'السنوي';return'-'}function resetForm(){$('formTitle').textContent='إنشاء كود خصم';$('editingCode').value='';$('code').disabled=false;$('couponForm').reset();$('planMonthly').checked=true;$('planYearly').checked=true;$('active').value='true'}$('resetFormBtn').addEventListener('click',resetForm);
    $('couponForm').addEventListener('submit',async e=>{e.preventDefault();const btn=$('saveBtn');try{const plans=[];if($('planMonthly').checked)plans.push('monthly');if($('planYearly').checked)plans.push('yearly');const payload={code:$('code').value.trim().toUpperCase(),label:$('label').value.trim(),type:$('type').value,value:Number($('value').value),allowedPlans:plans,maxUses:Number($('maxUses').value||0),active:$('active').value==='true',startsAt:toIsoOrNull($('startsAt').value),expiresAt:toIsoOrNull($('expiresAt').value),editingCode:$('editingCode').value.trim().toUpperCase()};if(!payload.code||!payload.type||!payload.value||!plans.length)throw new Error('missing-fields');setLoading(btn,true,'حفظ الكود');await authedFetch(endpoints.save,{method:'POST',body:JSON.stringify(payload)});showMessage('تم حفظ الكود.','ok');resetForm();await loadCoupons()}catch(e){showMessage('تعذر حفظ الكود. تأكد من البيانات والصلاحيات.','err')}finally{setLoading(btn,false,'حفظ الكود')}});
    async function loadCoupons(){if(!currentUser||!isVerifiedAdmin)return;const tbody=$('couponRows');tbody.innerHTML=`<tr><td colspan="8"><div class="empty">جاري التحميل...</div></td></tr>`;try{const data=await authedFetch(endpoints.list,{method:'POST',body:'{}'});coupons=data.coupons||[];renderCoupons()}catch(e){tbody.innerHTML=`<tr><td colspan="8"><div class="empty">تعذر تحميل الأكواد. تأكد من نشر الدوال وصلاحية الحساب.</div></td></tr>`}}
    function renderCoupons(){const tbody=$('couponRows');if(!coupons.length){tbody.innerHTML=`<tr><td colspan="8"><div class="empty">لا توجد أكواد خصم حتى الآن.</div></td></tr>`;return}tbody.innerHTML=coupons.map((c,i)=>`<tr><td><b>${c.code||''}</b></td><td>${c.label||'-'}</td><td>${formatDiscount(c)}</td><td>${plansText(c.allowedPlans)}</td><td>${c.usedCount||0} / ${c.maxUses||'مفتوح'}</td><td>من: ${formatDate(c.startsAt)}<br>إلى: ${formatDate(c.expiresAt)}</td><td><span class="status ${c.active?'on':'off'}">${c.active?'مفعل':'متوقف'}</span></td><td><div class="smallActions"><button class="btn secondary" onclick="editCoupon(${i})">تعديل</button><button class="btn ghost" onclick="toggleCoupon(${i})">${c.active?'إيقاف':'تفعيل'}</button><button class="btn danger" onclick="deleteCoupon(${i})">حذف</button></div></td></tr>`).join('')}
    window.editCoupon=i=>{const c=coupons[i];if(!c)return;$('formTitle').textContent=`تعديل: ${c.code}`;$('editingCode').value=c.code;$('code').value=c.code;$('code').disabled=true;$('label').value=c.label||'';$('type').value=c.type||'percent';$('value').value=c.value||'';$('maxUses').value=c.maxUses||'';$('active').value=String(Boolean(c.active));$('planMonthly').checked=(c.allowedPlans||[]).includes('monthly');$('planYearly').checked=(c.allowedPlans||[]).includes('yearly');$('startsAt').value=fromIsoForInput(c.startsAt);$('expiresAt').value=fromIsoForInput(c.expiresAt);window.scrollTo({top:0,behavior:'smooth'})};window.toggleCoupon=async i=>{const c=coupons[i];if(!c)return;try{await authedFetch(endpoints.save,{method:'POST',body:JSON.stringify({...c,active:!c.active,editingCode:c.code})});showMessage('تم تحديث حالة الكود.','ok');await loadCoupons()}catch(e){showMessage('تعذر تحديث حالة الكود.','err')}};window.deleteCoupon=async i=>{const c=coupons[i];if(!c)return;if(!confirm(`حذف كود ${c.code}؟`))return;try{await authedFetch(endpoints.delete,{method:'POST',body:JSON.stringify({code:c.code})});showMessage('تم حذف الكود.','ok');await loadCoupons()}catch(e){showMessage('تعذر حذف الكود.','err')}};
  </script>
</body>
</html>
